<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FutureX</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
  scroll-behavior: smooth;
}

/* Glow background */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, #00f0ff, transparent 40%);
  animation: moveBg 10s linear infinite;
  z-index: -1;
}

@keyframes moveBg {
  0% { transform: translate(0,0); }
  50% { transform: translate(-25%, -25%); }
  100% { transform: translate(0,0); }
}

/* Navbar */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px;
}

nav h1 {
  color: #00f0ff;
}

nav a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
  cursor: pointer;
}

/* Sections */
section {
  padding: 100px 20px;
  text-align: center;
}

/* Hero */
.hero h2 {
  font-size: 50px;
}

.hero button {
  padding: 15px 30px;
  background: #00f0ff;
  border: none;
  cursor: pointer;
  font-size: 18px;
}

/* Cards */
.cards {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  width: 200px;
  border-radius: 10px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px #00f0ff;
}

/* Launch overlay */
#launchScreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  color: #00f0ff;
  display: none;
  justify-content: center;
  align-items: center;
  font-size: 30px;
  flex-direction: column;
}

/* Footer */
footer {
  text-align: center;
  padding: 20px;
}
</style>
</head>

<body>

<nav>
  <h1>FutureX</h1>
  <div>
    <a onclick="goTo('home')">Home</a>
    <a onclick="goTo('features')">Features</a>
    <a onclick="goTo('contact')">Contact</a>
  </div>
</nav>

<section id="home" class="hero">
  <h2>Welcome to the Future</h2>
  <p>Your futuristic website starts here</p>
  <button onclick="launch()">Launch</button>
</section>

<section id="features">
  <h2>Features</h2>
  <div class="cards">
    <div class="card">Fast</div>
    <div class="card">Powerful</div>
    <div class="card">Smart</div>
  </div>
</section>

<section id="contact">
  <h2>Contact</h2>
  <p>Email: future@x.com</p>
</section>

<footer>
  © 2026 FutureX
</footer>

<!-- Launch Screen -->
<div id="launchScreen">
Launching...
</div>

<script>
function goTo(section) {
  document.getElementById(section).scrollIntoView();
}

function launch() {
  let screen = document.getElementById("launchScreen");
  screen.style.display = "flex";

  setTimeout(() => {
    screen.innerHTML = "Entering the Future...";
  }, 1500);

  setTimeout(() => {
    screen.style.display = "none";
  }, 3000);
}
</script>

</body>
</html>
