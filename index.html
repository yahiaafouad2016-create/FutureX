<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FutureX</title>

<style>
html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: white;
  overflow-x: hidden;
}

/* Animated background */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, #00f0ff, transparent 40%);
  animation: moveBg 10s linear infinite;
  z-index: -1;
}

@keyframes moveBg {
  0% { transform: translate(0,0); }
  50% { transform: translate(-20%, -20%); }
  100% { transform: translate(0,0); }
}

/* Navbar */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px;
  position: sticky;
  top: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
}

nav h1 {
  color: #00f0ff;
  margin: 0;
}

nav a {
  color: white;
  margin-left: 15px;
  text-decoration: none;
  cursor: pointer;
}

/* Sections */
section {
  padding: 100px 20px;
  text-align: center;
}

/* Hero */
.hero h2 {
  font-size: 50px;
}

button {
  padding: 15px 30px;
  background: #00f0ff;
  border: none;
  cursor: pointer;
  font-size: 18px;
  margin-top: 10px;
  border-radius: 8px;
}

/* Cards */
.cards {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  width: 200px;
  border-radius: 10px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px #00f0ff;
}

/* Launch screen */
#launchScreen {
  position: fixed;
  inset: 0;
  background: black;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  font-size: 30px;
  color: #00f0ff;
  z-index: 999;
}

/* Footer */
footer {
  text-align: center;
  padding: 20px;
  opacity: 0.7;
}
</style>
</head>

<body>

<nav>
  <h1>FutureX</h1>
  <div>
    <a onclick="goTo('home')">Home</a>
    <a onclick="goTo('features')">Features</a>
    <a onclick="goTo('contact')">Contact</a>
  </div>
</nav>

<section id="home" class="hero">
  <h2>Welcome to the Future</h2>
  <button onclick="launch()">Launch</button>
</section>

<section id="features">
  <h2>Features</h2>
  <div class="cards">
    <div class="card">Fast</div>
    <div class="card">Powerful</div>
    <div class="card">Smart</div>
  </div>
</section>

<section id="contact">
  <h2>Contact</h2>
  <p>future@x.com</p>
</section>

<footer>
  © 2026 FutureX
</footer>

<!-- Launch overlay -->
<div id="launchScreen">
  Launching...
</div>

<script>
function goTo(id) {
  document.getElementById(id).scrollIntoView({
    behavior: "smooth"
  });
}

function launch() {
  const screen = document.getElementById("launchScreen");
  screen.style.display = "flex";
  screen.innerHTML = "Launching...";

  setTimeout(() => {
    screen.innerHTML = "Entering Future...";
  }, 1200);

  setTimeout(() => {
    screen.innerHTML = "System Online";
  }, 2200);

  setTimeout(() => {
    screen.style.display = "none";
    goTo("features");
  }, 3200);
}
</script>

</body>
</html>
